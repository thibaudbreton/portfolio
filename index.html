<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Thibaud Breton — Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #212023, #2b292f);
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* GRID */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 100px 100px;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 60px 80px;
      max-width: 1200px;
    }

    .header {
      font-size: 24px;
      margin-bottom: 80px;
    }

    .header strong {
      font-weight: 800;
    }

    h1 {
      font-size: 90px;
      line-height: 0.9;
      margin: 0;
    }

    h1 span.light {
      font-weight: 200;
    }

    .subtitle {
      font-size: 28px;
      margin-top: 20px;
      font-weight: 300;
    }

    .desc {
      margin-top: 30px;
      font-size: 18px;
      color: #cfcfcf;
      max-width: 600px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 40px;
      padding: 16px 32px;
      background: white;
      color: black;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #f0f0f0;
    }

    .colors {
      display: flex;
      gap: 20px;
      margin-top: 60px;
    }

    .bar {
      height: 10px;
      width: 80px;
      border-radius: 4px;
    }

    @media (max-width: 900px) {
      h1 {
        font-size: 60px;
      }

      .container {
        padding: 40px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <strong>Portfolio</strong> 2026
    </div>

    <h1>
      <span class="light">Thibaud</span><br>
      BRETON
    </h1>

    <div class="subtitle">Product Designer</div>

    <div class="desc">
      Bienvenue sur mon portfolio. Vous y découvrirez une sélection de projets sur lesquels j'ai travaillé, allant de produits métiers complexes à des sujets plus orientés marketing et design.
    </div>

    <!-- 👉 IMPORTANT : lien direct vers ton PDF -->
    <a href="https://thibaudbreton.github.io/portfolio/PT2026.pdf" target="_blank" class="btn">
      Voir le portfolio
    </a>

    <div class="colors">
      <div class="bar" style="background:#bcc0c5;"></div>
      <div class="bar" style="background:#ffac92;"></div>
      <div class="bar" style="background:#ffd392;"></div>
      <div class="bar" style="background:#92ffb0;"></div>
      <div class="bar" style="background:#92f2ff;"></div>
      <div class="bar" style="background:#a192ff;"></div>
    </div>

  </div>

</body>
</html>
